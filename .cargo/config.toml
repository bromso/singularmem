# Cargo build configuration for x86_64-pc-windows-msvc.
#
# Background:
# usearch v2.15.3 pulls in cxx-rs, which compiles a C++ shim
# (cxx.cc → cxx.o) via cc-rs at build time. On MSVC, cc-rs defaults
# to /MT (static CRT). Meanwhile ort-sys ships a pre-built onnxruntime
# binary that Microsoft compiled with /MD (dynamic CRT). The linker
# refuses to mix:
#   error LNK2038: mismatch detected for 'RuntimeLibrary':
#     value 'MT_StaticRelease' doesn't match 'MD_DynamicRelease'
#
# Two layers of override are required, because Rust's target-feature
# rustflag only affects Rust compilation — cc-rs decides CRT linkage
# independently from the CFLAGS env vars:
#
# 1. `rustflags = ["-C", "target-feature=-crt-static"]` forces the
#    Rust-side portions to use /MD.
# 2. `CFLAGS_<target>` / `CXXFLAGS_<target>` env vars (the cc-rs
#    convention) force the C/C++ side to use /MD for that triple
#    specifically. Other triples are unaffected.
#
# See docs/superpowers/specs/2026-05-21-windows-msvc-fix-9-design.md
# for the full investigation.

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=-crt-static"]

[env]
CFLAGS_x86_64_pc_windows_msvc = "/MD"
CXXFLAGS_x86_64_pc_windows_msvc = "/MD"
