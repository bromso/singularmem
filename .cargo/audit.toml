# cargo-audit configuration — what advisories to ignore when running
# `cargo audit` in CI.
#
# Each entry MUST include a reason + revisit date. If the underlying
# situation is fixed upstream before the revisit date, drop the entry.

[advisories]
ignore = [
  # bincode 1.x is unmaintained as of 2025-12-16 (RUSTSEC-2025-0141).
  # The team has explicitly stated that 1.3.3 is feature-complete and
  # not in need of updates. We use bincode 1.x for vector index
  # serialization in singularmem-search. Migrating to wincode/postcard
  # is a separate sub-project; not security-actionable.
  "RUSTSEC-2025-0141",
  # instant 0.1.x is unmaintained as of 2024-09-01 (RUSTSEC-2024-0384).
  # Transitive dep; we don't pull it directly. Recommended replacement
  # `web-time` is upstream's responsibility. Informational only.
  "RUSTSEC-2024-0384",
  # number_prefix 0.4.x is unmaintained as of 2025-11-17
  # (RUSTSEC-2025-0119). Transitive dep, likely via indicatif. Not
  # security-actionable.
  "RUSTSEC-2025-0119",
  # paste 1.x is unmaintained as of 2024-10-07 (RUSTSEC-2024-0436).
  # Widely-used proc macro crate; many transitive deps use it. The
  # `pastey` fork is a drop-in replacement but adoption is upstream's
  # responsibility. Informational only.
  "RUSTSEC-2024-0436",
  # lru 0.12.5 has a Stacked Borrows soundness issue
  # (RUSTSEC-2026-0002, patched in 0.16.3+). Transitive dep we don't
  # pull directly. The unsoundness only matters under strict aliasing
  # checks (miri) and doesn't cause real-world memory corruption.
  # Revisit when our transitive deps upgrade to lru >= 0.16.3.
  "RUSTSEC-2026-0002",
]
