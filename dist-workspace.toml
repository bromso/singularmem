[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# A GitHub repo to push Homebrew formulas to
tap = "bromso/homebrew-tap"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["x86_64-unknown-linux-gnu", "x86_64-apple-darwin", "aarch64-apple-darwin", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Which actions to run on pull requests
pr-run-mode = "upload"
# Publish jobs to run
publish-jobs = ["homebrew"]
# Allow manual edits to the generated CI workflow (escape-hatch for the
# ubuntu-22.04 runner-label bump; cargo-dist 0.27.0 emits ubuntu-20.04
# which was retired by GitHub-hosted runners in April 2025).
allow-dirty = ["ci"]
