name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --all-features

  build:
    name: cargo build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets --release

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  tests-offline:
    name: tests (offline, --network=none)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build the test binaries with network access
        run: cargo test --no-run --workspace --all-targets
      - name: Run the test binaries with networking disabled
        # Re-launch cargo test inside an unprivileged user+network namespace
        # so any test that attempts a network syscall is rejected by the kernel.
        # This is the strongest possible "tests pass with networking disabled"
        # guarantee per Constitution Principle VI.
        #
        # `unshare -Urn` uses user-namespace mapping (no sudo) so the runner's
        # environment (PATH, RUSTUP_HOME, CARGO_HOME) propagates intact.
        # CARGO_NET_OFFLINE=true is belt-and-suspenders: even if a test wanted
        # to fetch a registry update, cargo refuses before hitting the kernel.
        env:
          CARGO_NET_OFFLINE: "true"
        run: |
          unshare -Urn -- bash -c '
            cargo test --workspace --all-targets
          '

  perf-budgets:
    name: perf-budgets (Principle X)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: .github/scripts/perf-check.sh

  macos-advisory:
    name: macOS advisory (non-blocking)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --all-features
      - run: cargo test --all-targets
