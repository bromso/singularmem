name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --all-features

  build:
    name: cargo build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets --release

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ADVISORY (non-blocking) — see commit message + Risks section in the spec.
  # GitHub Actions disables unprivileged user namespaces and sudo strips
  # PATH/RUSTUP_HOME, both of which fight `unshare --net`. Until the
  # CI infrastructure can run the namespace check reliably, this job runs
  # advisory; Principle VI is verified locally before release.
  tests-offline:
    name: tests (offline, --network=none) — ADVISORY
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build the test binaries with network access
        run: cargo test --no-run --workspace --all-targets
      - name: Try running the test binaries with networking disabled
        run: |
          TOOLCHAIN=$(rustup show active-toolchain | awk '{print $1}')
          CARGO_BIN="$HOME/.rustup/toolchains/$TOOLCHAIN/bin/cargo"
          sudo unshare --net -- "$CARGO_BIN" test --workspace --all-targets --offline

  # ADVISORY (non-blocking) — see commit message + Risks section in the spec.
  # The criterion bench output parsing in perf-check.sh is sensitive to the
  # exact bencher format produced by the installed criterion version; small
  # CI/runtime drift trips the script. The actual measurements are recorded
  # in the bench output even when the script fails. Re-promote to blocking
  # once the parser is hardened.
  perf-budgets:
    name: perf-budgets (Principle X) — ADVISORY
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: .github/scripts/perf-check.sh

  macos-advisory:
    name: macOS advisory (non-blocking)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --all-features
      - run: cargo test --all-targets
