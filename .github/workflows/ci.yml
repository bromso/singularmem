name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --all-features

  build:
    name: cargo build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets --release

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ADVISORY (non-blocking) — explicit non-goal for sub-project 2a
  # (Search v0 Lexical). GitHub Actions disables unprivileged user
  # namespaces and sudo strips PATH/RUSTUP_HOME, both of which fight
  # `unshare --net`. Until the CI infrastructure can run the namespace
  # check reliably, this job runs advisory; Principle VI is verified
  # locally before release.
  tests-offline:
    name: tests (offline, --network=none) — ADVISORY
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build the test binaries with network access
        run: cargo test --no-run --workspace --all-targets
      - name: Try running the test binaries with networking disabled
        run: |
          TOOLCHAIN=$(rustup show active-toolchain | awk '{print $1}')
          CARGO_BIN="$HOME/.rustup/toolchains/$TOOLCHAIN/bin/cargo"
          sudo unshare --net -- "$CARGO_BIN" test --workspace --all-targets --offline

  # Re-promoted to blocking in v0.2.0 (Search v0 Lexical, sub-project 2a).
  # Task 15 of the search-v0-lexical plan rewrote perf-check.sh to parse
  # criterion's estimates.json (stable schema) rather than CLI stdout, making
  # the parser reliable enough to gate CI on.
  perf-budgets:
    name: perf-budgets (Principle X)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: .github/scripts/perf-check.sh

  macos-advisory:
    name: macOS advisory (non-blocking)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --all-features
      - run: cargo test --all-targets

  node-bindings:
    name: node bindings (build + test + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: Swatinem/rust-cache@v2
      - name: Install npm dependencies
        working-directory: crates/singularmem-node
        run: npm install
      - name: Build native binding
        working-directory: crates/singularmem-node
        run: npm run build
      - name: Run Node tests
        working-directory: crates/singularmem-node
        run: node --test test/*.test.mjs
      - name: TypeScript type check
        working-directory: crates/singularmem-node
        run: npm run typecheck
      - name: Verify package.json version matches workspace
        run: |
          WS_VER=$(grep -A1 '^\[workspace.package\]' Cargo.toml | grep '^version' | head -1 | sed -E 's/.*"(.*)".*/\1/')
          PKG_VER=$(node -p "require('./crates/singularmem-node/package.json').version")
          echo "workspace=$WS_VER pkg=$PKG_VER"
          test "$WS_VER" = "$PKG_VER" || { echo "::error::version drift between Cargo workspace and crates/singularmem-node/package.json"; exit 1; }
